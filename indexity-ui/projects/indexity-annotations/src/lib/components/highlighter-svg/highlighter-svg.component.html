<svg
  attr.width="{{ svgOverlay.width }}"
  attr.height="{{ svgOverlay.height }}"
  *ngIf="isDrawnShapeVisible() || displayedShapes.length > 0"
  [ngStyle]="{
    cursor: cursor,
    left: svgOverlay.left + 'px',
    top: svgOverlay.top + 'px'
  }"
>
  <!-- Drawing Zone delimiter -->
  <rect
    id="svg-delimiter"
    data-cy="svg-delimiter"
    x="0"
    y="0"
    [attr.width]="svgOverlay.width"
    [attr.height]="svgOverlay.height"
    style="stroke: rgba(255, 0, 0, 0.5)"
    [ngStyle]="{ 'stroke-width': currentMode.stroke }"
    fill-opacity="0"
  />

  <!-- Drawn Shape -->
  <g *ngIf="isDrawnShapeVisible()">
    <rect
      *ngIf="!isLineDrawing()"
      data-cy="drawn-shape"
      id="highlighter"
      [attr.x]="drawnShape.posX"
      [attr.y]="drawnShape.posY"
      fill-opacity="0"
      stroke-width="2"
      [attr.stroke]="drawnShape.color"
      [attr.width]="drawnShape.width"
      [attr.height]="drawnShape.height"
    />
    <line
      *ngIf="isLineDrawing()"
      data-cy="drawn-line"
      id="highlighter-line"
      [attr.x1]="drawnShape.x1"
      [attr.y1]="drawnShape.y1"
      [attr.x2]="drawnShape.x2"
      [attr.y2]="drawnShape.y2"
      [attr.stroke]="drawnShape.color"
      stroke-width="3"
      stroke-linecap="round"
      fill-opacity="0"
    />
    <text
      data-cy="drawn-text"
      *ngIf="drawnShape.name.length > 0 && showLabels"
      [attr.x]="isLineDrawing() ? drawnShape.x1 + 10 : drawnShape.posX + 10"
      [attr.y]="isLineDrawing() ? drawnShape.y1 + 20 : drawnShape.posY + 20"
      font-family="Verdana, sans-serif"
      font-size="18"
      fill="white"
      font-weight="bold"
      style="text-shadow: 0px -1px black"
    >
      {{ drawnShape.name }}
    </text>
  </g>

  <!-- Displayed Shapes -->
  <!-- BUG FIX #1: use 'as pos' to call getPositionAtCurrentTime once per annotation
         instead of 4 separate calls per rect, avoiding redundant computation and
         potential mid-render inconsistency if the result were to change. -->
  <g
    *ngFor="
      let annotation of structureDisplayedShapes;
      trackBy: annotationsTrackBy
    "
    [attr.data-cy]="'annotation-' + annotation.id"
    (dblclick)="onAnnotationDblClick(annotation)"
    (click)="onAnnotationClick(annotation)"
    (mouseover)="onAnnotationHover(annotation.id)"
    (mouseleave)="onAnnotationLeave(annotation.id)"
    [ngStyle]="{
      display:
        hiddenAnnotations.includes(annotation.id) ||
        tmpSvgAnnotation?.id === annotation.id ||
        (currentMode.name === 'edit' && annotation.readonly)
          ? 'none'
          : 'block'
    }"
  >


    <!-- Rect annotation -->
    <ng-container

    
      *ngIf="
        !isLineAnnotation(annotation) &&
        getPositionAtCurrentTime(annotation.shape) as pos
      "
    >
      <rect
        [attr.x]="pos.x"
        [attr.y]="pos.y"
        [attr.width]="pos.width"
        [attr.height]="pos.height"
        [attr.stroke-width]="currentMode.name === 'edit' ? 3 : 2"
        [attr.stroke-dasharray]="currentMode.name === 'edit' ? 5 : 0"
        [attr.stroke]="annotation.label?.color"
        [attr.fill-opacity]="hovered === annotation.id ? 0.3 : 0"
        [attr.data-cy]="'annotation-' + annotation.id + '-shape'"
      />
      <text
        *ngIf="showLabels && annotation.label?.name?.length"
        [attr.x]="pos.x + 10"
        [attr.y]="pos.y + 20"
        [attr.data-cy]="'annotation-' + annotation.id + '-label'"
        font-family="Verdana, sans-serif"
        font-size="18"
        fill="white"
        font-weight="bold"
        style="text-shadow: 0px -1px black"
      >
        {{ annotation.label.name }}
      </text>
    </ng-container>

    <!-- Line annotation -->
    <!-- BUG FIX #2: add a transparent wider line as a hit target so the user
           doesn't need pixel-perfect aim to click or hover a 2px-wide line.
           The visible line sits on top; the hit line is invisible but 16px wide. -->
    <ng-container
      *ngIf="
        isLineAnnotation(annotation) &&
        getPositionAtCurrentTime(annotation.shape) as pos
      "
    >
      <!-- Hit area: wide transparent line for easy mouse interaction -->
      <line
        [attr.x1]="pos.x1"
        [attr.y1]="pos.y1"
        [attr.x2]="pos.x2"
        [attr.y2]="pos.y2"
        stroke="transparent"
        stroke-width="16"
        stroke-linecap="round"
        [attr.data-cy]="'annotation-' + annotation.id + '-hit'"
      />
      <!-- Visible line -->
      <line
        [attr.x1]="pos.x1"
        [attr.y1]="pos.y1"
        [attr.x2]="pos.x2"
        [attr.y2]="pos.y2"
        [attr.stroke-width]="
          hovered === annotation.id ? 4 : currentMode.name === 'edit' ? 3 : 2
        "
        [attr.stroke-dasharray]="currentMode.name === 'edit' ? 5 : 0"
        [attr.stroke]="annotation.label?.color"
        [attr.data-cy]="'annotation-' + annotation.id + '-shape'"
        stroke-linecap="round"
        fill="none"
      />
      <text
        *ngIf="showLabels && annotation.label?.name?.length"
        [attr.x]="pos.x1 + 10"
        [attr.y]="pos.y1 + 20"
        [attr.data-cy]="'annotation-' + annotation.id + '-label'"
        font-family="Verdana, sans-serif"
        font-size="18"
        fill="white"
        font-weight="bold"
        style="text-shadow: 0px -1px black"
      >
        {{ annotation.label.name }}
      </text>
    </ng-container>
  </g>
</svg>
